{% extends "base.html" %}

{% block title %}New Gift Registry — {{ current_user.active_family.name }}{% endblock %}

{% block content %}
<div class="page-head">
    <div>
        <div class="eyebrow">Gift Registries</div>
        <h1>New registry</h1>
    </div>
    <a href="{{ url_for('main.registries') }}" class="btn btn-secondary"><i data-lucide="x"></i> Cancel</a>
</div>

<div style="max-width:520px;">
    <div class="card">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="field">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="e.g. Emma's Graduation" maxlength="150" required>
            </div>

            <div class="field-row">
                <div class="field">
                    <label for="recipient_id">For</label>
                    <select id="recipient_id" name="recipient_id" required>
                        <option value="">— Choose a family member —</option>
                        {% for p in people %}
                        <option value="{{ p.id }}">{{ p.get_display_name() }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="field">
                    <label for="event_id">Event (optional)</label>
                    <select id="event_id" name="event_id">
                        <option value="">— None —</option>
                        {% for e in events %}
                        <option value="{{ e.id }}">{{ e.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <p style="font-size:12px;color:var(--slate);margin:4px 0 14px;">
                The person you choose won't be able to see this registry.
            </p>

            <div style="display:flex;gap:10px;">
                <button type="submit" class="btn btn-primary">Create registry</button>
                <a href="{{ url_for('main.registries') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're offline — OurPeaPod</title>
    <link rel="icon" href="/static/assets/favicon.svg" type="image/svg+xml">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #FAFAF7;
            color: #1a2b1b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .wrap { max-width: 360px; }
        img { width: 64px; height: 64px; margin-bottom: 24px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
        p { font-size: 15px; color: #4a6b4c; line-height: 1.6; margin-bottom: 24px; }
        button {
            background: #3D7040;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #2d5430; }
    </style>
</head>
<body>
    <div class="wrap">
        <img src="/static/assets/peavines-mark.svg" alt="OurPeaPod">
        <h1>You're offline</h1>
        <p>Check your connection and try again. Your family pod will be waiting.</p>
        <button onclick="window.location.reload()">Try again</button>
    </div>
</body>
</html>
